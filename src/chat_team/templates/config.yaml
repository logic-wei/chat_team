# chat_team global configuration.
#
# This file is seeded into ~/.chat_team/config.yaml on first run.
# Edit the user copy there — changes here only take effect for new installs.
# All paths are relative to ~/.chat_team/ unless absolute.
#
# 凭证也可通过同名环境变量设置（WECOM_BOT_ID / OPENAI_API_KEY 等），
# config.yaml 中的值优先。

# ---- 连接凭证 ---------------------------------------------------------------
# team 模式只需一个 bot 条目；solo 模式每个条目绑定一个角色。
bots:
  - bot_id: ""
    secret: ""

# solo 模式示例（取消注释，删除上方 bots 块）:
# mode: solo
# bots:
#   - name: research_engineer        # 必须匹配 roles/ 下的角色名
#     bot_id: "YOUR_BOT_ID_1"
#     secret: "YOUR_SECRET_1"
#   - name: customer_service
#     bot_id: "YOUR_BOT_ID_2"
#     secret: "YOUR_SECRET_2"

workspace_root: workspaces           # one subdirectory per chat session
default_role: team_admin             # role that handles a brand-new session
log_level: INFO                      # DEBUG / INFO / WARNING / ERROR

session:
  msgid_lru_size: 500                # WeCom callback dedup window
  persistence_debounce_seconds: 10   # session.json flush debounce
  per_turn_transfer_cap: 3           # max employee handoffs per user turn
  progress_status_enabled: true      # push periodic "still working" status while a turn is running
  progress_status_delay_seconds: 1.5 # first heartbeat delay after turn starts
  progress_status_interval_seconds: 2.5 # heartbeat interval during long processing
  progress_status_text: 正在处理,请稍候... # transient status text shown before final answer
  # max_in_memory_sessions: 1000     # LRU cap; exceeded entries flush to disk

notebook:
  max_bytes: 4096                    # soft cap for notebook.md (4KB)

tools:
  file_read_max_bytes: 1048576       # 1 MB
  file_write_max_bytes: 1048576      # 1 MB
  shell_timeout_seconds: 30
  shell_output_max_bytes: 8192       # truncate echo back to LLM (full log on disk)
  # shell_env_extra_drop: []         # extra env-var names to scrub from shell subprocess

llm:
  provider: openai                   # only "openai" supported in v1
  api_key: ""                        # 或 OPENAI_API_KEY 环境变量
  base_url: ""                       # 或 OPENAI_BASE_URL 环境变量；留空使用 OpenAI 官方地址
  chat:
    model: gpt-4o-mini
    temperature: 0.3
    history_token_budget: 12000      # per-role; tighter values trigger compaction sooner
    # reasoning_effort: ""           # optional: low | medium | high (empty = provider default)
  vision:
    api_key: ""                      # 留空回落到 llm.api_key；或 OPENAI_VISION_API_KEY 环境变量
    base_url: ""                     # 留空回落到 llm.base_url；或 OPENAI_VISION_BASE_URL 环境变量
    model: ""                        # empty = reuse llm.chat.model
    strategy: tool                   # tool | direct
    image_detail: high               # vision tile granularity: low | high | auto
    # reasoning_effort: ""           # optional: low | medium | high (empty = provider default)
    max_inline_bytes: 6291456        # 6 MB; 超过此大小的图片触发 oversized_image 策略
    oversized_image: resize          # resize (自动缩放) | reject (降级为占位符)
    resize_long_side: 2048           # 缩放后最长边像素数
    resize_quality: 85               # JPEG 重编码质量 (1-95, 推荐 85)
  debug_log_enabled: false           # write one JSON per LLM call to <workspace>/.chat_team/llm/
  http_debug_log_enabled: false      # write JSON logs for LLM HTTP requests (contains sensitive data)
  use_streaming: true                # use provider-side streaming
  request_timeout_seconds: 60        # per-attempt timeout ceiling for one LLM request
  max_retries: 3                     # total attempts including first call (transient errors only)
  retry_initial_delay: 1.0           # backoff base seconds before retry, with jitter
  # max_tool_loops_per_turn: 16      # max LLM↔tool round-trips in a single turn

logging:
  max_bytes: 10485760                # 10 MB per log file
  backup_count: 5                    # keep 5 rotated files

# cleanup:
#   max_age_days: 14                 # files older than this in inbox/runs/llm are removed
#   sweep_interval_hours: 6.0        # min gap between sweeps of the same session

# MCP (Model Context Protocol) — 连接外部工具服务器,无需写 Python 即可扩展角色能力。
#
# 使用步骤:
#   1. 取消下方注释,配置 MCP 服务器
#   2. 在角色 YAML 中添加 mcp_servers: [服务器名] 授权角色使用
#   3. 重启 bot — 启动日志会显示发现了多少工具
#
# mcp:
#   servers:
#     filesystem:
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/dir"]
#     github:
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-github"]
#       env:
#         GITHUB_PERSONAL_ACCESS_TOKEN: "ghp_..."
#     remote_api:
#       url: http://localhost:8080/sse
